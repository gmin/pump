name: Build Pump Token

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  RUST_BACKTRACE: 1
  RUST_LOG: debug

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: nightly-2024-04-02
        components: rustfmt, clippy

    - name: Cache Rust dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Install Solana
      run: |
        sh -c "$(curl -sSfL https://release.solana.com/v1.17.9/install)"
        echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
        export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
        solana --version

    - name: Setup Cargo config
      run: |
        mkdir -p $HOME/.cargo
        echo '[build]' >> $HOME/.cargo/config.toml
        echo 'rustflags = ["-C", "target-feature=+crt-static"]' >> $HOME/.cargo/config.toml

    - name: Check formatting
      working-directory: pump-token
      run: cargo fmt -- --check

    - name: Run clippy
      working-directory: pump-token
      run: cargo clippy -- -D warnings

    - name: Build
      working-directory: pump-token/programs/pump-token
      run: |
        cargo build --verbose
        ls -la target/deploy/

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pump-token
        path: pump-token/target/deploy/pump_token.so
        if-no-files-found: error 